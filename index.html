<!DOCTYPE html><html lang="ro"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Autopadova č Tools & Resources</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><style>  :root {    --bg: #0c0f14;    --surface: #151921;    --surface-hover: #1c2230;    --border: #252d3a;    --text: #e4e8f0;    --text-muted: #7a8599;    --accent: #3b82f6;    --accent-glow: rgba(59, 130, 246, 0.15);    --green: #22c55e;    --amber: #f59e0b;    --red: #ef4444;    --radius: 12px;  }  * { margin: 0; padding: 0; box-sizing: border-box; }  body {    font-family: 'DM Sans', sans-serif;    background: var(--bg);    color: var(--text);    min-height: 100vh;    overflow-x: hidden;  }  /* Subtle grid background */  body::before {    content: '';    position: fixed;    inset: 0;    background-image:      linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),      linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);    background-size: 60px 60px;    pointer-events: none;    z-index: 0;  }  .container {    position: relative;    z-index: 1;    max-width: 900px;    margin: 0 auto;    padding: 40px 20px 60px;  }  /* Header */  .header {    text-align: center;    margin-bottom: 48px;  }  .logo-row {    display: flex;    align-items: center;    justify-content: center;    gap: 14px;    margin-bottom: 16px;  }  .logo-mark {    width: 48px;    height: 48px;    background: linear-gradient(135deg, var(--accent), #6366f1);    border-radius: 14px;    display: flex;    align-items: center;    justify-content: center;    font-family: 'Space Mono', monospace;    font-weight: 700;    font-size: 22px;    color: #fff;    box-shadow: 0 4px 24px rgba(59, 130, 246, 0.3);  }  .logo-text {    font-size: 28px;    font-weight: 700;    letter-spacing: -0.5px;  }  .logo-text span {    color: var(--accent);  }  .subtitle {    color: var(--text-muted);    font-size: 15px;    margin-top: 8px;  }  .repo-badge {    display: inline-flex;    align-items: center;    gap: 6px;    margin-top: 16px;    padding: 6px 14px;    background: var(--surface);    border: 1px solid var(--border);    border-radius: 20px;    font-family: 'Space Mono', monospace;    font-size: 12px;    color: var(--text-muted);    text-decoration: none;    transition: all 0.2s;  }  .repo-badge:hover {    border-color: var(--accent);    color: var(--accent);  }  .repo-badge .dot {    width: 7px;    height: 7px;    border-radius: 50%;    background: var(--green);    animation: pulse 2s infinite;  }  @keyframes pulse {    0%, 100% { opacity: 1; }    50% { opacity: 0.4; }  }  /* Status bar */  .status-bar {    display: flex;    align-items: center;    justify-content: space-between;    padding: 12px 16px;    background: var(--surface);    border: 1px solid var(--border);    border-radius: var(--radius);    margin-bottom: 24px;    font-size: 13px;  }  .status-left {    display: flex;    align-items: center;    gap: 8px;    color: var(--text-muted);  }  .status-left .count {    color: var(--text);    font-weight: 700;  }  .refresh-btn {    display: flex;    align-items: center;    gap: 6px;    background: none;    border: 1px solid var(--border);    color: var(--text-muted);    padding: 6px 12px;    border-radius: 8px;    cursor: pointer;    font-family: 'DM Sans', sans-serif;    font-size: 12px;    transition: all 0.2s;  }  .refresh-btn:hover {    border-color: var(--accent);    color: var(--accent);  }  .refresh-btn.spinning svg {    animation: spin 0.8s linear infinite;  }  @keyframes spin {    to { transform: rotate(360deg); }  }  /* File list */  .file-list {    display: flex;    flex-direction: column;    gap: 8px;  }  .file-item {    display: flex;    align-items: center;    gap: 14px;    padding: 16px 18px;    background: var(--surface);    border: 1px solid var(--border);    border-radius: var(--radius);    text-decoration: none;    color: var(--text);    transition: all 0.2s ease;    cursor: pointer;    position: relative;    overflow: hidden;  }  .file-item::before {    content: '';    position: absolute;    left: 0;    top: 0;    bottom: 0;    width: 3px;    background: var(--accent);    opacity: 0;    transition: opacity 0.2s;  }  .file-item:hover {    background: var(--surface-hover);    border-color: rgba(59, 130, 246, 0.3);    transform: translateX(4px);  }  .file-item:hover::before {    opacity: 1;  }  .file-icon {    width: 40px;    height: 40px;    border-radius: 10px;    display: flex;    align-items: center;    justify-content: center;    font-size: 18px;    flex-shrink: 0;  }  .file-icon.html { background: rgba(239, 68, 68, 0.12); color: #ef4444; }  .file-icon.js   { background: rgba(245, 158, 11, 0.12); color: #f59e0b; }  .file-icon.css  { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }  .file-icon.md   { background: rgba(168, 85, 247, 0.12); color: #a855f7; }  .file-icon.json { background: rgba(34, 197, 94, 0.12);  color: #22c55e; }  .file-icon.img  { background: rgba(236, 72, 153, 0.12); color: #ec4899; }  .file-icon.dir  { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }  .file-icon.other { background: rgba(122, 133, 153, 0.12); color: #7a8599; }  .file-info {    flex: 1;    min-width: 0;  }  .file-name {    font-weight: 600;    font-size: 15px;    white-space: nowrap;    overflow: hidden;    text-overflow: ellipsis;  }  .file-meta {    font-size: 12px;    color: var(--text-muted);    margin-top: 2px;    font-family: 'Space Mono', monospace;  }  .file-arrow {    color: var(--text-muted);    transition: all 0.2s;    flex-shrink: 0;  }  .file-item:hover .file-arrow {    color: var(--accent);    transform: translateX(3px);  }  /* Folder breadcrumb */  .breadcrumb {    display: flex;    align-items: center;    gap: 4px;    margin-bottom: 16px;    font-size: 13px;    flex-wrap: wrap;  }  .breadcrumb a {    color: var(--accent);    text-decoration: none;    cursor: pointer;    padding: 4px 8px;    border-radius: 6px;    transition: background 0.2s;  }  .breadcrumb a:hover {    background: var(--accent-glow);  }  .breadcrumb .sep {    color: var(--text-muted);  }  .breadcrumb .current {    color: var(--text-muted);    padding: 4px 8px;  }  /* Loading & error states */  .loading {    text-align: center;    padding: 80px 20px;    color: var(--text-muted);  }  .loading .spinner {    width: 40px;    height: 40px;    border: 3px solid var(--border);    border-top-color: var(--accent);    border-radius: 50%;    animation: spin 0.8s linear infinite;    margin: 0 auto 16px;  }  .error {    text-align: center;    padding: 60px 20px;    color: var(--red);  }  .error h3 {    margin-bottom: 8px;  }  .error p {    color: var(--text-muted);    font-size: 14px;  }  /* Responsive */  @media (max-width: 600px) {    .container { padding: 24px 14px 40px; }    .logo-text { font-size: 22px; }    .file-item { padding: 12px 14px; gap: 10px; }    .file-icon { width: 36px; height: 36px; font-size: 16px; }    .status-bar { flex-direction: column; gap: 10px; }  }</style></head><body><div class="container">  <header class="header">    <div class="logo-row">      <div class="logo-mark">AP</div>      <div class="logo-text">Auto<span>padova</span></div>    </div>    <p class="subtitle">Sales & Marketing Tools Repository</p>    <a class="repo-badge" href="https://github.com/autopadova/autopadova" target="_blank" rel="noopener">      <span class="dot"></span>      autopadova / autopadova    </a>  </header>  <div class="status-bar">    <div class="status-left">      <span id="fileCount"><span class="count">č</span> files</span>      <span>ß</span>      <span id="lastLoaded">loading╔</span>    </div>    <button class="refresh-btn" onclick="refresh()" id="refreshBtn">      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>      Refresh    </button>  </div>  <nav class="breadcrumb" id="breadcrumb"></nav>  <div id="content">    <div class="loading">      <div class="spinner"></div>      <p>Fetching repository files╔</p>    </div>  </div></div><script>const OWNER = 'autopadova';const REPO  = 'autopadova';const BRANCH = 'main';const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;const PAGES = `https://${OWNER}.github.io/${REPO}`;let currentPath = '';function getExt(name) {  const parts = name.split('.');  return parts.length > 1 ? parts.pop().toLowerCase() : '';}function getIcon(name, type) {  if (type === 'dir') return { emoji: '??', cls: 'dir' };  const ext = getExt(name);  const map = {    html: { emoji: '??', cls: 'html' },    htm:  { emoji: '??', cls: 'html' },    js:   { emoji: '?', cls: 'js' },    mjs:  { emoji: '?', cls: 'js' },    css:  { emoji: '??', cls: 'css' },    md:   { emoji: '??', cls: 'md' },    json: { emoji: '{ }', cls: 'json' },    png:  { emoji: '??', cls: 'img' },    jpg:  { emoji: '??', cls: 'img' },    jpeg: { emoji: '??', cls: 'img' },    gif:  { emoji: '??', cls: 'img' },    svg:  { emoji: '??', cls: 'img' },    webp: { emoji: '??', cls: 'img' },    pdf:  { emoji: '??', cls: 'other' },  };  return map[ext] || { emoji: '??', cls: 'other' };}function formatSize(bytes) {  if (bytes < 1024) return bytes + ' B';  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';  return (bytes / 1048576).toFixed(1) + ' MB';}function getLink(item) {  if (item.type === 'dir') return null; // handled via navigate  const ext = getExt(item.name);  // HTML files ? open on GitHub Pages  if (['html', 'htm'].includes(ext)) {    return `${PAGES}/${item.path}`;  }  // Everything else ? raw GitHub link for direct view/download  return item.download_url || item.html_url;}function renderBreadcrumb(path) {  const bc = document.getElementById('breadcrumb');  if (!path) {    bc.innerHTML = '';    return;  }  const parts = path.split('/');  let html = `<a onclick="navigate('')">?? root</a>`;  let accumulated = '';  parts.forEach((p, i) => {    accumulated += (accumulated ? '/' : '') + p;    html += `<span class="sep">/</span>`;    if (i < parts.length - 1) {      html += `<a onclick="navigate('${accumulated}')">${p}</a>`;    } else {      html += `<span class="current">${p}</span>`;    }  });  bc.innerHTML = html;}async function fetchContents(path = '') {  const url = path ? `${API}/${path}?ref=${BRANCH}` : `${API}?ref=${BRANCH}`;  const res = await fetch(url);  if (!res.ok) {    // Try 'master' branch if 'main' fails    const fallback = path ? `${API}/${path}?ref=master` : `${API}?ref=master`;    const res2 = await fetch(fallback);    if (!res2.ok) throw new Error(`GitHub API: ${res2.status}`);    return res2.json();  }  return res.json();}function renderFiles(items) {  const content = document.getElementById('content');  // Sort: folders first, then alphabetically  items.sort((a, b) => {    if (a.type === 'dir' && b.type !== 'dir') return -1;    if (a.type !== 'dir' && b.type === 'dir') return 1;    return a.name.localeCompare(b.name);  });  // Count only files (not dirs)  const fileCount = items.filter(i => i.type !== 'dir').length;  const dirCount  = items.filter(i => i.type === 'dir').length;  document.getElementById('fileCount').innerHTML =    `<span class="count">${fileCount}</span> file${fileCount !== 1 ? 's' : ''}` +    (dirCount ? ` ß <span class="count">${dirCount}</span> folder${dirCount !== 1 ? 's' : ''}` : '');  const now = new Date();  document.getElementById('lastLoaded').textContent =    `loaded ${now.toLocaleTimeString()}`;  let html = '<div class="file-list">';  items.forEach((item, idx) => {    const icon = getIcon(item.name, item.type);    const link = getLink(item);    const size = item.size ? formatSize(item.size) : '';    const ext  = item.type === 'dir' ? 'folder' : (getExt(item.name) || 'file');    const tag  = item.type === 'dir' ? 'div' : 'a';    const href = item.type === 'dir' ? '' : `href="${link}" target="_blank" rel="noopener"`;    const click = item.type === 'dir' ? `onclick="navigate('${item.path}')"` : '';    const delay = Math.min(idx * 40, 400);    html += `      <${tag} class="file-item" ${href} ${click}        style="animation: fadeIn 0.3s ease ${delay}ms both;">        <div class="file-icon ${icon.cls}">${icon.emoji}</div>        <div class="file-info">          <div class="file-name">${item.name}</div>          <div class="file-meta">${ext}${size ? ' ß ' + size : ''}</div>        </div>        <div class="file-arrow">?</div>      </${tag}>`;  });  html += '</div>';  content.innerHTML = html;}async function navigate(path) {  currentPath = path;  renderBreadcrumb(path);  const content = document.getElementById('content');  content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading╔</p></div>`;  try {    const items = await fetchContents(path);    renderFiles(items);  } catch (err) {    content.innerHTML = `      <div class="error">        <h3>? Could not load files</h3>        <p>${err.message}</p>        <p style="margin-top:12px">          <button class="refresh-btn" onclick="navigate('${path}')">Try again</button>        </p>      </div>`;  }}function refresh() {  const btn = document.getElementById('refreshBtn');  btn.classList.add('spinning');  navigate(currentPath).finally(() => {    setTimeout(() => btn.classList.remove('spinning'), 500);  });}// Fade-in animationconst style = document.createElement('style');style.textContent = `@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }`;document.head.appendChild(style);// Initnavigate('');</script></body></html>
